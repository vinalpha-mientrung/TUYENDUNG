<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinAlpha – Phiếu Thông Tin Cá Nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
<script src="https://unpkg.com/docxtemplater@3.46.0/build/docxtemplater.js"></script>
<script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B2F6E;--navy2:#142357;--gold:#F5B800;--gold2:#E0A800;
  --white:#fff;--bg:#F0F3FA;--border:#C8D0E8;--muted:#6B7594;--text:#1A2340;--red:#D93025;
}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh}
body::before{content:'VinAlpha';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-family:'Montserrat',sans-serif;font-size:clamp(60px,18vw,140px);font-weight:900;color:var(--navy);opacity:0.03;pointer-events:none;z-index:0;white-space:nowrap;letter-spacing:-2px;user-select:none}

/* Các style khác giữ nguyên như file cũ của bạn */
.hero{background:var(--navy);position:relative;overflow:hidden}
.hero-inner{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 20px 28px;display:flex;align-items:flex-start;gap:20px}
.hero h1{font-family:'Montserrat',sans-serif;font-size:clamp(18px,3.8vw,30px);font-weight:900;color:#fff;line-height:1.2;margin-bottom:4px}
.hero h1 span{color:var(--gold)}
.form-wrap{max-width:900px;margin:0 auto;padding:24px 14px 80px;position:relative;z-index:1}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 10px rgba(27,47,110,0.06)}
.wt{width:100%;border-collapse:collapse}
.wt td{border:1px solid var(--border);padding:0;vertical-align:top}
.wt .lbl{background:#F4F6FB;font-size:11.5px;font-weight:700;color:var(--navy);padding:7px 10px;white-space:nowrap;border-right:1px solid var(--border);min-width:110px}
.wt .val{padding:4px 6px}
.wt .val input,.wt .val select,.wt .val textarea{width:100%;border:none;outline:none;background:transparent;font-size:14px;color:var(--text);padding:5px 7px}
.btn-word{background:#fff;color:var(--navy);border:2px solid var(--navy);font-weight:700;padding:14px 38px;border-radius:12px;cursor:pointer;width:100%;max-width:420px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:9px;font-size:13.5px;z-index:9999;display:none}
</style>
</head>
<body>

<!-- Phần giao diện form giữ nguyên như cũ (từ hero đến submit) -->
<!-- Bạn copy phần body cũ từ <div class="hero"> đến trước </body> cũ -->

<div class="hero"> ... </div>   <!-- (giữ nguyên) -->

<div class="form-wrap">
  <!-- Tất cả các card I, II, III... giữ nguyên như file cũ -->
</div>

<!-- ==================== SCRIPT MỚI ==================== -->
<script>
const TEMPLATE_B64 = 'UEsDBBQAAAAIAEsa21w+jmLJnQEAAFYJAAATAAAAW0NvbnRlbnRfVHlwZXNdLnhtbM...'; // ← Dán lại chuỗi TEMPLATE_B64 dài của bạn vào đây

function getVal(id) { return document.getElementById(id) ? document.getElementById(id).value.trim() : ''; }

function getDate(d, m, y) {
  const day = getVal(d);
  const month = getVal(m);
  const year = getVal(y);
  return (day && month && year) ? `${day}/${month}/${year}` : '';
}

function b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

async function taiWord() {
  const ho = getVal('ho');
  const ten = getVal('ten');
  const sdt = getVal('sdt');
  const viTriCheck = [...document.querySelectorAll('input[name="vitri"]:checked')].map(c => c.value).join(', ');

  if (!ho || !ten) return toast('⚠️ Vui lòng nhập họ và tên!', '#D93025');
  if (!sdt) return toast('⚠️ Vui lòng nhập số điện thoại!', '#D93025');
  if (!viTriCheck) return toast('⚠️ Vui lòng chọn ít nhất 1 vị trí!', '#D93025');

  const btn = document.getElementById('btnWord');
  const txt = document.getElementById('btnWordTxt');
  btn.disabled = true;
  txt.textContent = 'Đang tạo file...';

  try {
    const zip = new PizZip(b64ToArrayBuffer(TEMPLATE_B64));
    const doc = new docxtemplater(zip, { paragraphLoop: true, linebreaks: true, nullGetter: () => '' });

    const duAn = [...document.querySelectorAll('input[name="duan"]:checked')]
      .map(c => c.value === 'Khác' ? `Khác: ${getVal('duanKhac')}` : c.value).join(', ');

    const gtEl = document.querySelector('input[name="gt"]:checked');
    const hnEl = document.querySelector('input[name="hn"]:checked');
    const kenhEl = document.querySelector('input[name="kenh"]:checked');
    const tgEl = document.querySelector('input[name="tg"]:checked');
    const coGplx = document.getElementById('gplxSection').classList.contains('show');

    const gioiTinhText = gtEl ? (gtEl.value === 'Nam' ? 'Nam ☑  / Nữ ☐' : 'Nam ☐  / Nữ ☑') : 'Nam ☐  / Nữ ☐';
    const honNhanText = hnEl ? 
      (hnEl.value === 'Độc thân' ? 'Độc thân: ☑   Đã kết hôn: ☐   Ly dị: ☐' :
       hnEl.value === 'Đã kết hôn' ? 'Độc thân: ☐   Đã kết hôn: ☑   Ly dị: ☐' : 
       'Độc thân: ☐   Đã kết hôn: ☐   Ly dị: ☑') : '';

    const now = new Date();
    const ngayKy = `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`;

    doc.render({
      hoTen: `${ho} ${ten}`.trim(),
      thoiGian: tgEl ? tgEl.value : '',
      ngaySinh: getDate('ngaySinhNgay','ngaySinhThang','ngaySinhNam'),
      noiSinh: getVal('noiSinh'),
      chieuCao: getVal('chieuCao') ? getVal('chieuCao') + ' cm' : '',
      canNang: getVal('canNang') ? getVal('canNang') + ' kg' : '',
      viTri: viTriCheck,
      duAn: duAn,
      gioiTinhText: gioiTinhText,
      honNhanText: honNhanText,
      danToc: getVal('danToc') || 'Kinh',
      tonGiao: getVal('tonGiao'),
      sdtNha: getVal('sdtNha'),
      sdt: sdt,
      cccd: getVal('cccd'),
      ngayCap: getDate('ngayCapNgay','ngayCapThang','ngayCapNam'),
      noiCap: getVal('noiCap'),
      hoChieu: getVal('hoChieu'),
      hcHetHan: getDate('hcNgay','hcThang','hcNam'),
      email: getVal('email'),
      hoKhau: getVal('hoKhau'),
      diaChiHT: [getVal('diaChi'), getVal('quan'), getVal('tinh')].filter(Boolean).join(', '),
      bhxh: getVal('bhxh'),
      bhxhTT: getVal('bhxhTT'),
      mst: getVal('mst'),
      tkTech: getVal('tkTech'),
      tkKhac: getVal('tkKhac'),
      nganHang: getVal('nganHang'),
      llHoTen: getVal('llHoTen'),
      llSdt: getVal('llSdt'),
      llQuanHe: getVal('llQuanHe'),
      hocVan: getVal('hocVan'),
      tenTruong: getVal('tenTruong'),
      chuyenNganh: getVal('chuyenNganh'),
      soGplx: coGplx ? getVal('soGplx') : '',
      ttGplx: coGplx ? getVal('ttGplx') : '',
      ngayCapGplx: coGplx ? getDate('gplxNgay','gplxThang','gplxNam') : '',
      noiCapGplx: coGplx ? getVal('noiCapGplx') : '',
      loaiXe: coGplx ? getVal('loaiXe') : '',
      hoTenKy: `${ho} ${ten}`.trim().toUpperCase(),
      ngayKy: ngayKy
    });

    const blob = doc.getZip().generate({type: 'blob'});
    const nameClean = `${ho} ${ten}`.trim().replace(/\s+/g, '_');
    saveAs(blob, `PhieuThongTin_${nameClean}_${sdt.replace(/\s+/g,'')}.docx`);
    
    toast('✅ Tải file Word thành công!', '#1B6E2F');

  } catch(e) {
    console.error(e);
    toast('❌ Lỗi: ' + e.message, '#D93025');
  }

  btn.disabled = false;
  txt.textContent = 'Tải Phiếu Word (.docx)';
}

function toast(msg, color) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    document.body.appendChild(t);
  }
  t.style.cssText = `display:block;position:fixed;bottom:22px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:9px;font-size:13.5px;z-index:9999;background:${color};color:white;`;
  t.textContent = msg;
  setTimeout(() => t.style.display = 'none', 4000);
}
</script>
</body>
</html>
